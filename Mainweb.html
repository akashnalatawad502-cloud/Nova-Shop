<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NovaShop | Products</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styl.css">
  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: beige;
  color: rgb(22, 22, 22);
}

.header {
  width: 100%;
  padding: 20px 8%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
}

.logo {
  font-size: 1.8rem;
  font-weight: 700;
  color: rgb(58, 58, 168);
}

.navbar {
  display: flex;
  gap: 30px;
}

.navbar a {
  text-decoration: none;
  color: rgb(44, 44, 44);
  font-weight: 500;
  transition: 0.3s;
}

.navbar a:hover,
.navbar .active {
  color:rgb(75, 75, 250);
}



  </style>
</head>

<body>

  <header class="header">

    <div class="logo">NovaShop</div>

    <nav class="navbar">
      <a href="in.html">Home</a>
      <a href="sanket.html" class="active">Products</a>
      <a href="cat.html">Categories</a>
      <a href="cont.html">Contact</a>
    </nav>

  </header>

  <section class="page-title">
    <h1>Our Products</h1>
    <p>Explore trending products.</p>
  </section>

  <section class="products-grid">

    <div class="product-card">
      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1000&auto=format&fit=crop">
      <h3>Nike Sneakers</h3>
      <p>$120</p>
      <button>Add to Cart</button>
    </div>

    <div class="product-card">
      <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=1000&auto=format&fit=crop">
      <h3>Smartphone</h3>
      <p>$899</p>
      <button>Add to Cart</button>
    </div>

    <div class="product-card">
      <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=1000&auto=format&fit=crop">
      <h3>Headphones</h3>
      <p>$199</p>
      <button>Add to Cart</button>
    </div>

  </section>

  <script>const cartButtons=document.querySelectorAll(".product-card button");let cartCount=0;const cartDisplay=document.createElement("div");cartDisplay.style.position="fixed";cartDisplay.style.bottom="20px";cartDisplay.style.right="20px";cartDisplay.style.background="rgb(75,75,250)";cartDisplay.style.color="white";cartDisplay.style.padding="12px 18px";cartDisplay.style.borderRadius="10px";cartDisplay.style.fontWeight="600";cartDisplay.style.boxShadow="0 4px 10px rgba(0,0,0,0.2)";cartDisplay.innerHTML="🛒 Cart: 0";document.body.appendChild(cartDisplay);cartButtons.forEach(button=>{button.addEventListener("click",()=>{cartCount++;cartDisplay.innerHTML=`🛒 Cart: ${cartCount}`;const productName=button.parentElement.querySelector("h3").innerText;alert(productName+" added to cart!");button.innerText="Added ✓";button.style.background="green";setTimeout(()=>{button.innerText="Add to Cart";button.style.background="rgb(75,75,250)"},1500)})});</script>

</body>
</html>
