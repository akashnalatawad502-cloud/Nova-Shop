<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NovaShop | Contact</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styl.css">
</head>

<body>

  <header class="header">

    <div class="logo">NovaShop</div>

    <nav class="navbar">
      <a href="in.html">Home</a>
      <a href="Mainweb.html">Products</a>
      <a href="cat.html">Categories</a>
      <a href="cont.html" class="active">Contact</a>
    </nav>

  </header>

  <section class="page-title">
    <h1>Contact Us</h1>
    <p>We would love to hear from you.</p>
  </section>

  <section class="contact-section">

    <form class="contact-form">

      <input type="text" placeholder="Your Name" required>

      <input type="email" placeholder="Your Email" required>

      <textarea rows="6" placeholder="Your Message"></textarea>

      <button type="submit">
        Send Message
      </button>

    </form>

  </section>

  <script>const form=document.querySelector(".contact-form");form.addEventListener("submit",e=>{e.preventDefault();
   const name=form.querySelector('input[type="text"]').value;alert("Thank you "+name+"! Your message has been sent successfully.");
   form.reset();
   });

  </script>
</body>
</html>
