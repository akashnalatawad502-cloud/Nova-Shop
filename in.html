<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NovaShop | Home</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styl.css">
</head>

<body>

  <header class="header">

    <div class="logo">NovaShop</div>

    <nav class="navbar">
      <a href="in.html" class="active">Home</a>
     
    </nav>

  </header>

  <section class="hero">

    <div class="hero-content">

      <span class="tag">🔥 Trending Collection 2026</span>
     
      <h1>
        Modern Shopping
        Experience
      </h1>

      <p>
        Discover premium fashion, electronics,
        and lifestyle products.
      </p>

      <div class="hero-buttons">
        <a href="Mainweb.html" class="btn primary-btn">
          Shop Now
        </a>

        <a href="cat.html" class="btn secondary-btn">
          Browse Categories
        </a>
      </div>

    </div>

    <div class="hero-image">
      <img
        src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1200&auto=format&fit=crop"
        alt="Shopping"
      >
    </div>

  </section>

  <script>document.querySelectorAll(".navbar a").forEach(link=>{link.addEventListener("mouseover",()=>{link.style.color="rgb(75,75,250)"});
  link.addEventListener("mouseout",()=>{if(!link.classList.contains("active"))link.style.color="rgb(44,44,44)"})});
  const shopBtn=document.querySelector(".primary-btn");shopBtn.addEventListener("click",e=>{alert("Welcome to NovaShop! Start shopping now.")
  });</script>

</body>
</html>
